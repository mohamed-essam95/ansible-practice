---
- name: Stop Apache in web servers
  hosts: web
  become: yes # Run tasks with sudo/root privilege
  tasks:
    - name: Stop Apache service
      service:
        name: apache2
        state: stopped # Make sure the service is stopped
        enabled: no # Disable the service to prevent it from starting on boot

    - name: Remove Apache
      apt:
        name: apache2
        state: absent  # Ensure apache2 is uninstalled